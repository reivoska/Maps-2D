<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peta Navigasi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map"></div>

    <!-- Control Panel -->
    <div class="control-panel" id="controlPanel">
        <div class="panel-handle" id="panelHandle"></div>
        <div class="input-group">
            <input type="text" id="startInput" placeholder="📍 Lokasi awal" autocomplete="off">
            <div class="autocomplete-dropdown" id="startDropdown"></div>
        </div>
        <div class="input-group">
            <input type="text" id="endInput" placeholder="🎯 Tujuan" autocomplete="off">
            <div class="autocomplete-dropdown" id="endDropdown"></div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="findRouteBtn">
                <span class="btn-icon">🔍</span>
                <span class="btn-text">Cari Rute</span>
            </button>
            <button class="btn btn-secondary" id="currentLocationBtn">
                <span class="btn-icon">📍</span>
                <span class="btn-text">Lokasi Saya</span>
            </button>
            <button class="btn btn-info" id="centerMapBtn">
                <span class="btn-icon">🔄</span>
                <span class="btn-text">Reset Peta</span>
            </button>
            <button class="btn btn-danger" id="clearRouteBtn">
                <span class="btn-icon">🗑️</span>
                <span class="btn-text">Hapus</span>
            </button>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel" id="infoPanel">
        <div class="route-stats">
            <div class="stat-item">
                <div class="stat-value" id="distance">-</div>
                <div class="stat-label">Jarak</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="duration">-</div>
                <div class="stat-label">Waktu</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="steps">-</div>
                <div class="stat-label">Langkah</div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div>Mencari rute terbaik...</div>
    </div>

    <!-- Status Notification -->
    <div class="status-notification" id="statusNotification"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
